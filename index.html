<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Княжий Орден | Премиальный клуб</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #050c08;
      --bg-card: rgba(20, 30, 22, 0.75);
      --gold-primary: #d4af37;
      --gold-glow: #f5e18b;
      --gold-dark: #aa7c2c;
      --emerald: #1e4d2e;
      --emerald-bright: #2b7a3e;
      --text-light: #f3f0e6;
      --text-muted: #c0bba5;
      --border-gold: rgba(212, 175, 55, 0.4);
      --shadow-strong: 0 25px 40px -12px rgba(0,0,0,0.6);
      --glass-blur: blur(12px);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg-deep);
      background-image: 
        radial-gradient(circle at 25% 40%, rgba(30, 77, 46, 0.2) 0%, transparent 35%),
        repeating-linear-gradient(45deg, rgba(212,175,55,0.02) 0px, rgba(212,175,55,0.02) 2px, transparent 2px, transparent 8px);
      font-family: 'Inter', sans-serif;
      color: var(--text-light);
      line-height: 1.5;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a130e;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--gold-primary);
      border-radius: 8px;
    }

    h1, h2, h3, .hero-title, .detail-title, .card-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .hero {
      position: relative;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,0,0,0.2), var(--bg-deep));
      isolation: isolate;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://www.transparenttextures.com/patterns/black-mamba.png');
      opacity: 0.15;
      pointer-events: none;
      z-index: -2;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 20%, rgba(212,175,55,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-logo {
      width: 220px;
      height: auto;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5));
      transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .hero-logo:hover {
      transform: scale(1.02);
    }

    .hero-title {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      background: linear-gradient(135deg, #f9e7b3 0%, var(--gold-primary) 40%, #e9c468 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-top: 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .hero-divider {
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), var(--gold-glow), var(--gold-primary), transparent);
      margin: 1.2rem auto;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.3rem);
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      font-weight: 300;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.8rem;
      color: var(--gold-primary);
      animation: bounceStrong 1.2s infinite;
      opacity: 0.85;
      cursor: pointer;
    }

    @keyframes bounceStrong {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
      30% { transform: translateX(-50%) translateY(10px) scale(1.05); }
      50% { transform: translateX(-50%) translateY(18px) scale(0.98); }
      70% { transform: translateX(-50%) translateY(8px) scale(1.03); }
    }
    .scroll-indicator:hover { opacity: 1; }

    .section-grid {
      max-width: 1300px;
      margin: 4rem auto;
      padding: 2rem;
    }

    .section-label {
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-primary);
      margin-bottom: 3rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .section-label i {
      font-size: 1.6rem;
      color: var(--gold-primary);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .card {
      background: rgba(15, 25, 18, 0.65);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border-gold);
      border-radius: 28px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transform-style: preserve-3d;
      box-shadow: 0 10px 25px -12px rgba(0,0,0,0.5);
    }

    .card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: var(--gold-primary);
      box-shadow: 0 30px 40px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.3) inset;
      background: rgba(20, 32, 22, 0.85);
    }

    .card-image-wrap {
      position: relative;
      padding-top: 100%;
      overflow: hidden;
      background: #0f1912;
    }

    .card-image-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease-out;
    }

    .card:hover .card-image-wrap img {
      transform: scale(1.08);
    }

    .card-number {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--gold-primary);
      border: 1px solid rgba(212,175,55,0.5);
      z-index: 2;
    }

    .card-body {
      padding: 1.2rem 1.2rem 1.5rem;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-arrow {
      font-size: 0.8rem;
      color: var(--gold-primary);
      transition: transform 0.3s, opacity 0.3s;
      display: inline-block;
      margin-top: 0.5rem;
      opacity: 0.7;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(6px);
    }

    .section-details {
      max-width: 1100px;
      margin: 0 auto 6rem;
      padding: 2rem;
    }

    .details-sep {
      width: 220px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), var(--gold-glow), var(--gold-primary), transparent);
      margin: 2rem auto 4rem;
      position: relative;
    }
    .details-sep::before, .details-sep::after {
      content: "✦";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-primary);
      background: var(--bg-deep);
      padding: 0 0.5rem;
      font-size: 0.9rem;
    }
    .details-sep::before { left: -12px; }
    .details-sep::after { right: -12px; }

    .detail-block {
      background: rgba(10, 18, 12, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-gold);
      border-radius: 32px;
      padding: 2.5rem;
      margin-bottom: 4rem;
      transition: all 0.3s;
      scroll-margin-top: 100px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .detail-block:hover {
      border-color: var(--gold-primary);
      background: rgba(12, 22, 15, 0.8);
      box-shadow: 0 25px 45px -12px black;
    }

    .detail-block::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15%;
      bottom: 15%;
      width: 4px;
      background: linear-gradient(to bottom, var(--gold-primary), var(--emerald-bright), transparent);
      border-radius: 4px;
    }

    .detail-block {
      position: relative;
    }

    .detail-num {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--gold-primary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .detail-title {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      margin-bottom: 1.5rem;
      display: inline-block;
      background: linear-gradient(120deg, var(--text-light), var(--gold-glow));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .detail-content {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 3rem;
      align-items: center;
    }

    @media (max-width: 700px) {
      .detail-content { grid-template-columns: 1fr; }
      .detail-block { padding: 1.5rem; }
    }

    .detail-text {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 520px;
    }

    .detail-text p + p {
      margin-bottom: 0.6rem;
      color: var(--text-muted);
    }

    .detail-image-wrap {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border-gold);
      background: #0c140f;
      padding-top: 70%;
      transition: all 0.3s;
    }

    .detail-image-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .detail-block:hover .detail-image-wrap img {
      transform: scale(1.03);
    }

    /* Стилі для каруселі аптеки */
    .pharmacy-slider {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: #0c140f;
      border: 1px solid var(--border-gold);
    }
    .slider-images {
      position: relative;
      padding-top: 70%;
    }
    .slider-images img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: var(--gold-primary);
      border: 1px solid rgba(212,175,55,0.6);
      font-size: 1.8rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    .slider-btn:hover {
      background: var(--gold-primary);
      color: #0a130e;
      border-color: var(--gold-glow);
    }
    .slider-prev { left: 10px; }
    .slider-next { right: 10px; }
    .slider-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      color: var(--text-light);
      padding: 1rem;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 500;
      pointer-events: none;
      z-index: 5;
    }
    .slider-caption span {
      display: block;
      font-size: 0.8rem;
      color: var(--gold-primary);
    }
    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.active {
      background: var(--gold-primary);
      transform: scale(1.3);
    }

    .go-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--gold-primary);
      color: #0a130e;
      width: 48px;
      height: 48px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 99;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border: none;
    }
    .go-top.visible {
      opacity: 1;
      visibility: visible;
    }
    .go-top:hover {
      background: var(--gold-glow);
      transform: translateY(-4px);
    }

    .fade-up {
      opacity: 0;
      transform: translateY(35px);
      transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.7s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 680px) {
      .cards-grid { gap: 1.2rem; }
      .hero-logo { width: 160px; }
      .section-grid, .section-details { padding: 1rem; }
      .slider-btn { width: 32px; height: 32px; font-size: 1.2rem; }
    }

    .detail-text .label:has(+ .benefits) {
      margin-top: 1.8rem;
    }
  </style>
</head>
<body>

<header class="hero">
  <img src="mainlogo.png" alt="Княжий Орден герб" class="hero-logo">
  <h1 class="hero-title">Княжий Орден</h1>
  <div class="hero-divider"></div>
  <p class="hero-subtitle">Ласкаво просимо до спільноти обраних</p>
  <div class="scroll-indicator">
    <i class="fas fa-chevron-down"></i>
  </div>
</header>

<section class="section-grid">
  <div class="section-label">
    <i class="fas fa-crown"></i> 
    <span>ПОДАРУНКИ І КЕШБЕК КЛУБНОЇ КАРТИ</span>
    <i class="fas fa-crown"></i>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</section>

<section class="section-details">
  <div class="details-sep"></div>
  <div id="detailsContainer"></div>
</section>

<button class="go-top" id="goTopBtn" aria-label="Наверх">
  <i class="fas fa-arrow-up"></i>
</button>

<script>
  // Дані для аптеки: масив фото, назв та адрес
  const pharmacyMedia = [
    { img: 'apteka2.jpg', caption: 'Аптека - Масани', address: 'вул. Незалежності, 46, Чернігів' },
    { img: 'apteka1.jpg', caption: 'Аптека - Еськова', address: 'вул. Еськова, 10, Чернігів' },
    { img: 'apteka4.jpg', caption: 'Аптека - Пологовий будинок', address: 'Перший поверх' },
    { img: 'apteka5.jpg', caption: 'Аптека - Сімейна Поліклініка', address: 'Перший поверх' },
    { img: 'apteka3.jpg', caption: 'Аптека - Міська лікарня №3 (ЧРПЗ)', address: 'Перший поверх' },
    { img: 'apteka6.jpg', caption: 'Аптека - Міська лікарня №1', address: 'Перший поверх' },
  ];

const restaurantMedia = [
  { img: 'rest.jpg', caption: 'Червоний Зал', address: 'Ресторація "Княжий Орден"' },
  { img: 'rest1.jpg', caption: 'Блакитний зал', address: 'Другий поверх' },

];

  const businesses = [
    { id: 1, name: 'Аптека Маркет', desc: 'Якщо у вас активна клубна карта в аптеках Ви отримуєте кешбек 1% ', image: 'apteka.jpg' },
    { id: 2, name: 'Більярдний клуб', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Безкоштовна 1 година гри у більярд', image: 'billiard.jpg' },
    { id: 3, name: 'Дитячий магазин', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Кешбек 10% на покупки', image: 'detski.jpg' },
    { id: 4, name: 'Зарядка для електромобілів', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Ми надаємо можливість зарядити ваш автомобіль на 10 кВт безкоштовно.', image: 'electro.webp' },
    { id: 5, name: 'Victoria Secret', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Кешбек 10% на покупки', image: 'vs10.jpg' },
    { id: 6, name: 'Готельний номер', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). МИ надаємо можливість прожити 1 добу безкоштовно з сніданком. В іншоому випадку 1700 грн за добу зі сніданком.', image: 'hotel.jpg' },
    { id: 7, name: 'SPA & Сауна', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Ми надаємо можливість скористуватися сауною 1 годину безкоштовно', image: 'sauna.jpg' },
    { id: 8, name: 'Жива Вода', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). 100% ПРИРОДНІЙ СКЛАД; ПРОХОДИТЬ ОЧИЩЕННЯ НА ПРОФЕСІЙНОМУ ОБЛАДНЕННІ БЕЗ ЗВОРОТНЬОГО ОСМОСУ. При купілві на 50грн(безкоштовно 5 літрів води), При купівлі на 100грн(безкоштовно 10 літрів води) і так далі', image: 'water.jpg' },
    { id: 9, name: 'Косметологія', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Безкоштовна процедура шкіри обличчя. Знижка на професійну косметику 10%. Кешбек 10%', image: 'cosmo.jpg' },
    { id: 10, name: 'Ресторація', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Кешбек 10%. 1 безкоштовне відвідування ресторану згідно меню. ', image: 'rest.jpg' },
    { id: 11, name: 'Стоянка під охороною', desc: 'Якщо у вас активна клубна карта в аптеках (розрахунки кожного місяця на протязі року за товари та послуги). Ви отримуєете можливість користуватися стоянкою 1 рік безкоштовно ', image: 'park.jpg' },
  ];

  const gridContainer = document.getElementById('cardsGrid');
  const detailsContainer = document.getElementById('detailsContainer');

  function smoothScrollTo(targetY, duration = 900) {
    const startY = window.scrollY;
    const diff = targetY - startY;
    let startTime = null;
    function ease(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }
    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      const time = Math.min((timestamp - startTime) / duration, 1);
      const eased = ease(time);
      window.scrollTo(0, startY + diff * eased);
      if (time < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // генерація карток
  businesses.forEach(b => {
    const card = document.createElement('div');
    card.className = 'card fade-up';
    card.innerHTML = `
      <div class="card-image-wrap">
        <img src="${b.image}" alt="${b.name}" loading="lazy" onerror="this.src='https://placehold.co/400x400/1a3a22/d4af37?text=Княжий+Орден'">
        <span class="card-number">${String(b.id).padStart(2, '0')}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${b.name}</div>
        <div class="card-arrow">Детальніше <i class="fas fa-arrow-right"></i></div>
      </div>
    `;
    card.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(`detail-${b.id}`);
      if (!target) return;
      const targetY = target.getBoundingClientRect().top + window.pageYOffset - 80;
      smoothScrollTo(targetY, 1000);
    });
    gridContainer.appendChild(card);
  });

  // генерація детальних блоків
// генерація детальних блоків
// Генерація детальних блоків
businesses.forEach(b => {
  const block = document.createElement('div');
  block.className = 'detail-block fade-up';
  block.id = `detail-${b.id}`;

  // Спільна розмітка тексту для всіх блоків
  const textContent = `
    <div class="detail-text">
      <div class="label" style="color: var(--text-muted); margin-bottom: 1rem;">Умова:</div>
      <p class="main-text" style="color: var(--text-muted); margin-bottom: 1.5rem;">
        Активна клубна карта - регулярні розрахунки протягом року
      </p>
      
      <div class="label" style="color: var(--text-muted); margin-bottom: 1rem;">Вигода:</div>
      
      <ul class="benefits" style="list-style: none; padding-left: 0;">
        <li style="margin-bottom: 0.8rem; position: relative; padding-left: 1.5rem; color: var(--text-muted);">
          <span style="position: absolute; left: 0; color: var(--gold-primary);">•</span>
          ${b.desc}
        </li>
        <li style="margin-bottom: 0.8rem; position: relative; padding-left: 1.5rem; color: var(--text-muted);">
          <span style="position: absolute; left: 0; color: var(--gold-primary);">•</span>
          Ексклюзивні умови для учасників
        </li>
        <li style="margin-bottom: 0.8rem; position: relative; padding-left: 1.5rem; color: var(--text-muted);">
          <span style="position: absolute; left: 0; color: var(--gold-primary);">•</span>
          Персональний сервіс
        </li>
      </ul>
    </div>
  `;

  if (b.id === 1 || b.id === 10) {
    const isPharmacy = b.id === 1;
    const mediaSet = isPharmacy ? pharmacyMedia : restaurantMedia;
    const sliderId = isPharmacy ? 'pharmacy' : 'restaurant';

    block.innerHTML = `
        <div class="detail-num">${String(b.id).padStart(2, '0')} / 10</div>
        <h2 class="detail-title">${b.name}</h2>
        <div class="detail-content">
          ${textContent}
          <div class="pharmacy-slider" data-slider-id="${sliderId}">
            <div class="slider-images">
              ${mediaSet.map((item, idx) => `<img src="${item.img}" alt="${item.caption}" data-index="${idx}" style="opacity: ${idx === 0 ? '1' : '0'}; transition: opacity 0.4s ease;">`).join('')}
            </div>
            <div class="slider-btn slider-prev"><i class="fas fa-chevron-left"></i></div>
            <div class="slider-btn slider-next"><i class="fas fa-chevron-right"></i></div>
            <div class="slider-caption">
              <strong>${mediaSet[0].caption}</strong><br>
              <span>${mediaSet[0].address}</span>
            </div>
          </div>
        </div>
        <div class="slider-dots" style="margin-top: 12px; text-align: center;">
          ${mediaSet.map((_, idx) => `<div class="dot ${idx === 0 ? 'active' : ''}" data-dot-index="${idx}" data-for-slider="${sliderId}"></div>`).join('')}
        </div>
      `;
  } else {
    block.innerHTML = `
        <div class="detail-num">${String(b.id).padStart(2, '0')} / 10</div>
        <h2 class="detail-title">${b.name}</h2>
        <div class="detail-content">
          ${textContent}
          <div class="detail-image-wrap">
            <img src="${b.image}" alt="${b.name}" loading="lazy" onerror="this.src='https://placehold.co/600x400/1a3a22/d4af37?text=Орден'">
          </div>
        </div>
      `;
  }
  detailsContainer.appendChild(block);
});
  // Ініціалізація каруселі для аптеки
function initAllSliders() {
  const sliders = document.querySelectorAll('.pharmacy-slider');
  
  sliders.forEach(sliderContainer => {
    const sliderId = sliderContainer.getAttribute('data-slider-id');
    const mediaSet = sliderId === 'pharmacy' ? pharmacyMedia : restaurantMedia;
    
    const images = sliderContainer.querySelectorAll('.slider-images img');
    const prevBtn = sliderContainer.querySelector('.slider-prev');
    const nextBtn = sliderContainer.querySelector('.slider-next');
    const captionDiv = sliderContainer.querySelector('.slider-caption');
    const dots = sliderContainer.parentElement.querySelectorAll(`.dot[data-for-slider="${sliderId}"]`);
    
    let currentIndex = 0;

    function updateSlider(index) {
      images.forEach((img, i) => {
        img.style.opacity = i === index ? '1' : '0';
      });
      if (captionDiv && mediaSet[index]) {
        captionDiv.innerHTML = `<strong>${mediaSet[index].caption}</strong><br><span>${mediaSet[index].address}</span>`;
      }
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });
    }

    nextBtn?.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider(currentIndex);
    });

    prevBtn?.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      updateSlider(currentIndex);
    });

    dots.forEach((dot, idx) => {
      dot.addEventListener('click', () => {
        currentIndex = idx;
        updateSlider(currentIndex);
      });
    });
  });
}

// Запуск ініціалізації
setTimeout(initAllSliders, 150);

  // Intersection Observer для анімації
  const fadeElements = document.querySelectorAll('.fade-up');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: "0px 0px -20px 0px" });
  fadeElements.forEach(el => observer.observe(el));

  // Кнопка вгору
  const goTopBtn = document.getElementById('goTopBtn');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 600) goTopBtn.classList.add('visible');
    else goTopBtn.classList.remove('visible');
  });
  goTopBtn.addEventListener('click', () => {
    const section = document.querySelector('.section-grid');
    if (section) {
      const targetY = section.getBoundingClientRect().top + window.pageYOffset - 70;
      smoothScrollTo(targetY, 1000);
    }
  });

  const scrollHint = document.querySelector('.scroll-indicator');
  if (scrollHint) {
    scrollHint.addEventListener('click', () => {
      const section = document.querySelector('.section-grid');
      if (section) {
        const targetY = section.getBoundingClientRect().top + window.pageYOffset - 70;
        smoothScrollTo(targetY, 1000);
      }
    });
  }

  window.addEventListener('mousemove', (e) => {
    const hero = document.querySelector('.hero');
    if(hero) {
      const x = (e.clientX / window.innerWidth) * 10;
      const y = (e.clientY / window.innerHeight) * 10;
      hero.style.backgroundPosition = `${x}% ${y}%`;
    }
  });
</script>
</body>
</html>
